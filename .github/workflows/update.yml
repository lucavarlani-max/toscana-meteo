name: Aggiorna dati temperatura

on:
  schedule:
    - cron: '*/30 * * * *'   # ogni 30 minuti
  workflow_dispatch:           # esecuzione manuale dal sito GitHub

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Esegui scraper
        run: python scraper.py

      - name: Commit e push index.html aggiornato
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html geocache.json
          git diff --cached --quiet || git commit -m "Aggiornamento dati $(date -u '+%d/%m/%Y %H:%M UTC')"
          git push
